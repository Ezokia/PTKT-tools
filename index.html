<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTKT Tools</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --sidebar-w: 220px;
      --bg: #f7f6f3;
      --sidebar-bg: #1a1a1a;
      --sidebar-text: #a8a8a8;
      --sidebar-active: #ffffff;
      --sidebar-active-bg: #2e2e2e;
      --sidebar-hover: #242424;
      --accent: #c00000;
      --border: #e2e0db;
      --content-bg: #ffffff;
      --text: #1a1a1a;
      --text-muted: #888;
      --font-ui: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html, body {
      height: 100%;
    }

    body {
      display: flex;
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
    }

    .sidebar-header {
      padding: 28px 20px 20px;
      border-bottom: 1px solid #2e2e2e;
    }

    .sidebar-brand {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 500;
      color: #ffffff;
      letter-spacing: 0.02em;
    }

    .sidebar-sub {
      font-size: 11px;
      color: var(--sidebar-text);
      margin-top: 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .sidebar-section {
      padding: 20px 0 8px;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 20px 8px;
    }

    .nav-item {
      display: block;
      padding: 10px 20px;
      font-size: 13.5px;
      color: var(--sidebar-text);
      text-decoration: none;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      user-select: none;
    }

    .nav-item:hover {
      background: var(--sidebar-hover);
      color: #e0e0e0;
    }

    .nav-item.active {
      color: var(--sidebar-active);
      background: var(--sidebar-active-bg);
      border-left-color: var(--accent);
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px 20px;
      border-top: 1px solid #2e2e2e;
      font-size: 11px;
      color: #444;
      font-family: var(--font-mono);
    }

    /* ── CONTENT ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--content-bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .topbar-badge {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 3px;
    }

    .content-frame {
      flex: 1;
      position: relative;
    }

    .tool-panel {
      display: none;
      width: 100%;
      height: 100%;
    }

    .tool-panel.active {
      display: block;
    }

    .tool-panel iframe {
      width: 100%;
      height: calc(100vh - 57px);
      border: none;
      display: block;
    }

    /* ── PLACEHOLDER ── */
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 57px);
      color: var(--text-muted);
      gap: 10px;
    }

    .placeholder-title {
      font-size: 15px;
      font-weight: 500;
      color: #bbb;
    }

    .placeholder-sub {
      font-size: 13px;
      color: #ccc;
      font-family: var(--font-mono);
    }

    .placeholder-tag {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--accent);
      border: 1px solid #e8c8c8;
      background: #fff5f5;
      padding: 3px 10px;
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">PTKT Tools</div>
      <div class="sidebar-sub">Bộ công cụ nội bộ</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Công cụ</div>

      <a class="nav-item active" data-tool="footnote" data-label="Chuyển đổi Footnote">
        Chuyển đổi Footnote
      </a>
      <a class="nav-item" data-tool="beautify" data-label="Beautify HTML">
        Beautify HTML
      </a>
      <a class="nav-item" data-tool="convert" data-label="Convert to WordPress">
        Convert to WordPress
      </a>
      <a class="nav-item" data-tool="convert2blog" data-label="WordPress → Blogger">
        WordPress → Blogger
      </a>
      <a class="nav-item" data-tool="hyperlink" data-label="Auto Hyperlink">
        Auto Hyperlink
      </a>
    </div>

    <div class="sidebar-footer">
      v1.0 — PTKT
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">Chuyển đổi Footnote</span>
      <span class="topbar-badge" id="topbar-key">footnote</span>
    </div>

    <div class="content-frame">

      <!-- Tool: Footnote -->
      <div class="tool-panel active" id="panel-footnote">
        <iframe src="tools/footnote.html" title="Chuyển đổi Footnote"></iframe>
      </div>

      <!-- Tool: Beautify -->
      <div class="tool-panel" id="panel-beautify">
        <iframe src="tools/beautify.html" title="Beautify HTML"></iframe>
      </div>

      <!-- Tool: Convert to WordPress -->
      <div class="tool-panel" id="panel-convert">
        <iframe src="tools/convert2wp.html" title="Convert to WordPress"></iframe>
      </div>

      <!-- Tool: Convert WP → Blogger -->
      <div class="tool-panel" id="panel-convert2blog">
        <iframe src="tools/convert2blog.html" title="WordPress → Blogger"></iframe>
      </div>

      <!-- Tool: Auto Hyperlink -->
      <div class="tool-panel" id="panel-hyperlink">
        <iframe src="tools/hyperlink.html" title="Auto Hyperlink"></iframe>
      </div>

    </div>
  </main>

  <script>
    const navItems = document.querySelectorAll('.nav-item');
    const panels = document.querySelectorAll('.tool-panel');
    const topbarTitle = document.getElementById('topbar-title');
    const topbarKey = document.getElementById('topbar-key');

    // Map tool key → src file (chỉ load khi click, tránh load hết)
    const toolSrc = {
      footnote: 'tools/footnote.html',
      beautify: 'tools/beautify.html',
      convert:  'tools/convert2wp.html',
      convert2blog: 'tools/convert2blog.html',
      hyperlink:'tools/hyperlink.html',
    };

    navItems.forEach(item => {
      item.addEventListener('click', () => {
        const tool = item.dataset.tool;
        const label = item.dataset.label;

        // Update sidebar active
        navItems.forEach(n => n.classList.remove('active'));
        item.classList.add('active');

        // Update topbar
        topbarTitle.textContent = label;
        topbarKey.textContent = tool;

        // Switch panel
        panels.forEach(p => p.classList.remove('active'));
        const panel = document.getElementById('panel-' + tool);
        panel.classList.add('active');

        // Lazy load iframe nếu chưa có src
        const iframe = panel.querySelector('iframe');
        if (iframe && !iframe.src.includes(toolSrc[tool])) {
          iframe.src = toolSrc[tool];
        }
      });
    });
  </script>

</body>
</html>
